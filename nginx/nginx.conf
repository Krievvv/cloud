# ============================================================
# NGINX - Load Balancer & Reverse Proxy
# Simulasi: CDN Entry Point, HA, dan Traffic Distribution
# ============================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # =============================================
    # LOG FORMAT - untuk monitoring distribusi load
    # =============================================
    log_format cloud_log '$remote_addr - [$time_local] '
                         '"$request" $status $body_bytes_sent '
                         'upstream: $upstream_addr '
                         'cache: $upstream_cache_status '
                         'time: ${request_time}s';

    access_log /var/log/nginx/access.log cloud_log;

    # =============================================
    # UPSTREAM GROUP - Worker Node Pool
    # Simulasi IaaS: resource pool yang bisa di-scale
    # Algoritma: round-robin (default) - democratic load distribution
    # =============================================
    upstream app_servers {
        # Round-robin load balancing (democratic distribution)
        server app-node-1:5000 weight=1 max_fails=3 fail_timeout=10s;
        server app-node-2:5000 weight=1 max_fails=3 fail_timeout=10s;
        # app-node-3 akan ditambahkan saat horizontal scaling demo
        # server app-node-3:5000 weight=1 max_fails=3 fail_timeout=10s;

        keepalive 32;
    }

    # =============================================
    # CACHE ZONE - Simulasi CDN Content Caching
    # keys_zone=cloud_cache: nama zone
    # 10m: ukuran metadata (10MB)
    # max_size=100m: max disk cache
    # inactive=60m: hapus jika tidak diakses 60 menit
    # =============================================
    proxy_cache_path /tmp/nginx_cache
                     levels=1:2
                     keys_zone=cloud_cache:10m
                     max_size=100m
                     inactive=60m
                     use_temp_path=off;

    # =============================================
    # MAIN SERVER BLOCK - Entry Point (Port 80)
    # =============================================
    server {
        listen 80;
        server_name localhost;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Load-Balancer "nginx-cloud-lb";

        # =============================================
        # LOCATION / - Main Application Routes
        # =============================================
        location / {
            proxy_pass http://app_servers;

            # Cache configuration
            proxy_cache cloud_cache;
            proxy_cache_valid 200 30s;          # Cache sukses selama 30 detik
            proxy_cache_valid 404 10s;
            proxy_cache_use_stale error timeout updating; # Pakai stale cache saat server down
            proxy_cache_background_update on;   # Update cache di background

            # Headers untuk tracing
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Expose cache status ke client
            add_header X-Cache-Status $upstream_cache_status;
            add_header X-Served-By $upstream_addr;

            # Timeout settings (fault tolerance)
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
            proxy_next_upstream error timeout http_500 http_502 http_503;
            proxy_next_upstream_tries 2;        # Coba node lain jika gagal
        }

        # =============================================
        # /health - Health Check Endpoint
        # =============================================
        location /health {
            proxy_pass http://app_servers;
            proxy_cache off;  # Jangan cache health check
        }

        # =============================================
        # /static - Simulasi CDN Static Asset Delivery
        # Cache lebih lama untuk static assets
        # =============================================
        location /static/ {
            proxy_pass http://app_servers;
            proxy_cache cloud_cache;
            proxy_cache_valid 200 5m;           # Static cache 5 menit
            add_header X-Cache-Status $upstream_cache_status;
            add_header Cache-Control "public, max-age=300";
        }

        # =============================================
        # /no-cache - Endpoint tanpa cache (untuk demo)
        # =============================================
        location /no-cache {
            proxy_pass http://app_servers;
            proxy_cache off;
            add_header X-Cache-Status "BYPASS";
            add_header X-Served-By $upstream_addr;
        }

        # =============================================
        # /dashboard - Visual Web Dashboard
        # =============================================
        location = /dashboard {
            alias /usr/share/nginx/html/dashboard.html;
            add_header Content-Type text/html;
        }

        # Error pages
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            return 503 '{"error":"All nodes unavailable","status":503}';
            add_header Content-Type application/json;
        }
    }

    # =============================================
    # STATUS DASHBOARD (Port 8080) - Monitoring
    # =============================================
    server {
        listen 8080;
        server_name localhost;

        root /usr/share/nginx/html;

        # Dashboard UI
        location = / {
            try_files /dashboard.html =404;
        }

        location = /dashboard {
            try_files /dashboard.html =404;
        }

        location /nginx_status {
            stub_status on;
            allow all;
        }
    }
}
