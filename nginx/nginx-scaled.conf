# ============================================================
# nginx-scaled.conf - Digunakan setelah horizontal scaling 
# (app-node-3 ditambahkan dan Dashboard tetap aktif)
# ============================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format cloud_log '$remote_addr - [$time_local] '
                         '"$request" $status $body_bytes_sent '
                         'upstream: $upstream_addr '
                         'cache: $upstream_cache_status '
                         'time: ${request_time}s';

    access_log /var/log/nginx/access.log cloud_log;

    # =============================================
    # UPSTREAM GROUP SETELAH SCALING (3 NODE)
    # =============================================
    upstream app_servers {
        server app-node-1:5000 weight=1 max_fails=3 fail_timeout=10s;
        server app-node-2:5000 weight=1 max_fails=3 fail_timeout=10s;
        server app-node-3:5000 weight=1 max_fails=3 fail_timeout=10s;  # NODE 3 AKTIF

        keepalive 32;
    }

    proxy_cache_path /tmp/nginx_cache levels=1:2 keys_zone=cloud_cache:10m max_size=100m inactive=60m use_temp_path=off;

    # =============================================
    # MAIN SERVER BLOCK (Port 80)
    # =============================================
    server {
        listen 80;
        server_name localhost;

        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Load-Balancer "nginx-cloud-lb-scaled";
        add_header X-Active-Nodes "3";

        location / {
            proxy_pass http://app_servers;
            proxy_cache cloud_cache;
            proxy_cache_valid 200 30s;
            proxy_cache_valid 404 10s;
            proxy_cache_use_stale error timeout updating;
            proxy_cache_background_update on;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            add_header X-Cache-Status $upstream_cache_status;
            add_header X-Served-By $upstream_addr;

            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
            proxy_next_upstream error timeout http_500 http_502 http_503;
            proxy_next_upstream_tries 3;
        }

        location /health {
            proxy_pass http://app_servers;
            proxy_cache off;
        }

        location /static/ {
            proxy_pass http://app_servers;
            proxy_cache cloud_cache;
            proxy_cache_valid 200 5m;
            add_header X-Cache-Status $upstream_cache_status;
            add_header Cache-Control "public, max-age=300";
        }

        location /no-cache {
            proxy_pass http://app_servers;
            proxy_cache off;
            add_header X-Cache-Status "BYPASS";
            add_header X-Served-By $upstream_addr;
        }

        # =============================================
        # /dashboard - Visual Web Dashboard (Route yang hilang)
        # =============================================
        location = /dashboard {
            alias /usr/share/nginx/html/dashboard.html;
            add_header Content-Type text/html;
        }

        error_page 502 503 504 /50x.html;
        location = /50x.html {
            return 503 '{"error":"All nodes unavailable","status":503}';
            add_header Content-Type application/json;
        }
    }

    # =============================================
    # STATUS DASHBOARD (Port 8080)
    # =============================================
    server {
        listen 8080;
        server_name localhost;

        root /usr/share/nginx/html;

        location = / {
            try_files /dashboard.html =404;
        }

        location = /dashboard {
            try_files /dashboard.html =404;
        }

        location /nginx_status {
            stub_status on;
            allow all;
        }
    }
}