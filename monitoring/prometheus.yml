global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'mini-cloud-nodes'
    static_configs:
      - targets:
          - 'app-node-1:5000'
          - 'app-node-2:5000'
        labels:
          cluster: 'mini-cloud'
    metrics_path: '/metrics'

  - job_name: 'nginx'
    static_configs:
      - targets: ['load-balancer:8080']
    metrics_path: '/nginx_status'
